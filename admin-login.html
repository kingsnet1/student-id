<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - First Class SHS</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <style>
        /* same green/white theme */
        body {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            color: #2e7d32;
            font-family: Arial, sans-serif;
        }
        h2 {
            color: #1b5e20;
            border-bottom: 2px solid #4caf50;
            padding-bottom: 10px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #a5d6a7;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background: #4caf50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #388e3c;
        }
    </style>
</head>
<body>
    <h2>Admin Login</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <script>
        // 🔁 REPLACE WITH YOUR FIREBASE CONFIG
        const firebaseConfig = {
    apiKey: "AIzaSyD2NcVIBagGd2X6iWPVc8jgsNziJ46qowA",
    authDomain: "student-id-77c22.firebaseapp.com",
    projectId: "student-id-77c22",
    storageBucket: "student-id-77c22.firebasestorage.app",
    messagingSenderId: "291646901870",
    appId: "1:291646901870:web:05a5fce5252ede9e5a207f"
  };
    
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, password)
                .then(() => window.location.href = 'admin-dashboard.html')
                .catch(error => alert(error.message));
        });
    </script>
</body>
</html>
