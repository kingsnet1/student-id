<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Class SHS - Student Registration</title>
    <!-- Firebase SDK (Firestore only) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8f5e9 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .glass-container {
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 100, 0, 0.1);
            padding: 30px;
        }

        h2 {
            color: #1b5e20;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,50,0,0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #2e7d32;
            font-size: 0.95rem;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            font-size: 1rem;
            color: #1e3c1e;
            border: 1px solid rgba(76, 175, 80, 0.3);
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4caf50;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3);
            margin-top: 10px;
        }

        button:hover {
            background: linear-gradient(135deg, #66bb6a, #388e3c);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.4);
        }

        #result {
            margin-top: 25px;
            padding: 20px;
            background: rgba(232, 245, 233, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 16px;
            border-left: 5px solid #4caf50;
            display: none;
            text-align: center;
        }

        #result h3 {
            color: #1b5e20;
            margin-bottom: 10px;
        }

        #result p {
            font-size: 1.2rem;
            color: #2e7d32;
        }

        #studentId {
            font-weight: 700;
            color: #1b5e20;
            background: rgba(255,255,255,0.5);
            padding: 4px 12px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 5px;
        }

        /* subtle placeholder style */
        ::placeholder {
            color: #6b8e6b;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <h2>First Class SHS - Student Registration</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">Full Name *</label>
                <input type="text" id="fullName" placeholder="Enter full name" required>
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth *</label>
                <input type="date" id="dob" required>
            </div>

            <div class="form-group">
                <label for="fatherName">Father's Name *</label>
                <input type="text" id="fatherName" placeholder="Father's full name" required>
            </div>

            <div class="form-group">
                <label for="fatherPhone">Father's Phone *</label>
                <input type="tel" id="fatherPhone" placeholder="e.g., 0244123456" required>
            </div>

            <div class="form-group">
                <label for="motherName">Mother's Name *</label>
                <input type="text" id="motherName" placeholder="Mother's full name" required>
            </div>

            <div class="form-group">
                <label for="motherPhone">Mother's Phone *</label>
                <input type="tel" id="motherPhone" placeholder="e.g., 0244123456" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" placeholder="student@example.com" required>
            </div>

            <div class="form-group">
                <label for="branch">Branch *</label>
                <select id="branch" required>
                    <option value="">-- Select Branch --</option>
                    <option value="Afranco (Kumasi)">Afranco (Kumasi)</option>
                    <option value="Edwenase (Kumasi)">Edwenase (Kumasi)</option>
                    <option value="Accra">Accra</option>
                    <option value="Takoradi">Takoradi</option>
                    <option value="Tamale">Tamale</option>
                </select>
            </div>

            <div class="form-group">
                <label for="programme">Programme *</label>
                <select id="programme" required>
                    <option value="">-- Select Programme --</option>
                    <option value="General Science">General Science</option>
                    <option value="General Arts">General Arts</option>
                    <option value="Agric Science">Agric Science</option>
                    <option value="Business">Business</option>
                    <option value="Home Economics">Home Economics</option>
                    <option value="Visual Arts">Visual Arts</option>
                    <option value="Technical">Technical</option>
                </select>
            </div>

            <button type="submit">Register</button>
        </form>

        <div id="result">
            <h3>🎉 Registration Successful!</h3>
            <p>Your Student ID: <span id="studentId"></span></p>
        </div>
    </div>

    <script>
        // 🔁 REPLACE WITH YOUR FIREBASE CONFIG
        const firebaseConfig = {
    apiKey: "AIzaSyD2NcVIBagGd2X6iWPVc8jgsNziJ46qowA",
    authDomain: "student-id-77c22.firebaseapp.com",
    projectId: "student-id-77c22",
    storageBucket: "student-id-77c22.firebasestorage.app",
    messagingSenderId: "291646901870",
    appId: "1:291646901870:web:05a5fce5252ede9e5a207f"
  };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Collect form data (including branch)
            const formData = {
                fullName: document.getElementById('fullName').value,
                dob: document.getElementById('dob').value,
                fatherName: document.getElementById('fatherName').value,
                fatherPhone: document.getElementById('fatherPhone').value,
                motherName: document.getElementById('motherName').value,
                motherPhone: document.getElementById('motherPhone').value,
                email: document.getElementById('email').value,
                branch: document.getElementById('branch').value,
                programme: document.getElementById('programme').value,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            // Generate unique 10-digit ID (document ID) with retries
            let studentId = null;
            let success = false;
            let attempts = 0;
            const maxAttempts = 10;

            while (!success && attempts < maxAttempts) {
                const timestamp = Date.now().toString().slice(-5);
                const random = Math.floor(Math.random() * 100000).toString().padStart(5, '0');
                const candidateId = (timestamp + random).slice(0, 10);

                try {
                    await db.collection('students').doc(candidateId).set({
                        ...formData,
                        studentId: candidateId
                    });
                    studentId = candidateId;
                    success = true;
                } catch (error) {
                    if (error.code === 'already-exists') {
                        attempts++;
                        continue;
                    }
                    // Other error (permissions, etc.) – rethrow
                    throw error;
                }
            }

            if (!success) {
                alert('Could not generate a unique ID. Please try again.');
                return;
            }

            // Show success
            document.getElementById('studentId').textContent = studentId;
            document.getElementById('result').style.display = 'block';
            document.getElementById('registerForm').reset();
        });
    </script>
</body>
</html>
