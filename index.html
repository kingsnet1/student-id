<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Class SHS - Student Registration</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        /* (same glass styling as before – keep unchanged) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8f5e9 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .glass-container {
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 100, 0, 0.1);
            padding: 30px;
        }
        h2 {
            color: #1b5e20;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,50,0,0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #2e7d32;
            font-size: 0.95rem;
        }
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            font-size: 1rem;
            color: #1e3c1e;
            border: 1px solid rgba(76, 175, 80, 0.3);
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #4caf50;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3);
            margin-top: 10px;
        }
        button:hover:not(:disabled) {
            background: linear-gradient(135deg, #66bb6a, #388e3c);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.4);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #result, #error {
            margin-top: 25px;
            padding: 20px;
            background: rgba(232, 245, 233, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 16px;
            display: none;
            text-align: center;
        }
        #result {
            border-left: 5px solid #4caf50;
        }
        #error {
            border-left: 5px solid #f44336;
            background: rgba(255, 235, 238, 0.7);
        }
        #result h3 {
            color: #1b5e20;
            margin-bottom: 10px;
        }
        #error h3 {
            color: #c62828;
            margin-bottom: 10px;
        }
        #studentId {
            font-weight: 700;
            color: #1b5e20;
            background: rgba(255,255,255,0.5);
            padding: 4px 12px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 5px;
        }
        ::placeholder {
            color: #6b8e6b;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <h2>First Class SHS - Student Registration</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">Full Name *</label>
                <input type="text" id="fullName" placeholder="Enter full name" required>
            </div>
            <div class="form-group">
                <label for="dob">Date of Birth *</label>
                <input type="date" id="dob" required>
            </div>
            <div class="form-group">
                <label for="fatherName">Father's Name *</label>
                <input type="text" id="fatherName" placeholder="Father's full name" required>
            </div>
            <div class="form-group">
                <label for="fatherPhone">Father's Phone *</label>
                <input type="tel" id="fatherPhone" placeholder="e.g., 0244123456" required>
            </div>
            <div class="form-group">
                <label for="motherName">Mother's Name *</label>
                <input type="text" id="motherName" placeholder="Mother's full name" required>
            </div>
            <div class="form-group">
                <label for="motherPhone">Mother's Phone *</label>
                <input type="tel" id="motherPhone" placeholder="e.g., 0244123456" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" placeholder="student@example.com" required>
            </div>
            <div class="form-group">
                <label for="branch">Branch *</label>
                <select id="branch" required>
                    <option value="">-- Select Branch --</option>
                    <option value="Afranco (Kumasi)">Afranco (Kumasi)</option>
                    <option value="Edwenase (Kumasi)">Edwenase (Kumasi)</option>
                    <option value="Accra">Accra</option>
                    <option value="Takoradi">Takoradi</option>
                    <option value="Tamale">Tamale</option>
                </select>
            </div>
            <div class="form-group">
                <label for="programme">Programme *</label>
                <select id="programme" required>
                    <option value="">-- Select Programme --</option>
                    <option value="General Science">General Science</option>
                    <option value="General Arts">General Arts</option>
                    <option value="Agric Science">Agric Science</option>
                    <option value="Business">Business</option>
                    <option value="Home Economics">Home Economics</option>
                    <option value="Visual Arts">Visual Arts</option>
                    <option value="Technical">Technical</option>
                </select>
            </div>
            <button type="submit" id="registerBtn">Register</button>
        </form>
        <div id="result">
            <h3>🎉 Registration Successful!</h3>
            <p>Your Student ID: <span id="studentId"></span></p>
        </div>
        <div id="error">
            <h3>⚠️ Registration Failed</h3>
            <p id="errorMessage"></p>
        </div>
    </div>

    <script>
        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD2NcVIBagGd2X6iWPVc8jgsNziJ46qowA",
            authDomain: "student-id-77c22.firebaseapp.com",
            projectId: "student-id-77c22",
            storageBucket: "student-id-77c22.firebasestorage.app",
            messagingSenderId: "291646901870",
            appId: "1:291646901870:web:05a5fce5252ede9e5a207f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const resultDiv = document.getElementById('result');
        const errorDiv = document.getElementById('error');
        const errorMessage = document.getElementById('errorMessage');
        const studentIdSpan = document.getElementById('studentId');

        resultDiv.style.display = 'none';
        errorDiv.style.display = 'none';

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            registerBtn.disabled = true;
            registerBtn.textContent = 'Registering...';
            resultDiv.style.display = 'none';
            errorDiv.style.display = 'none';

            try {
                const email = document.getElementById('email').value.trim().toLowerCase();

                // Prepare student data
                const studentData = {
                    fullName: document.getElementById('fullName').value,
                    dob: document.getElementById('dob').value,
                    fatherName: document.getElementById('fatherName').value,
                    fatherPhone: document.getElementById('fatherPhone').value,
                    motherName: document.getElementById('motherName').value,
                    motherPhone: document.getElementById('motherPhone').value,
                    email: email,
                    branch: document.getElementById('branch').value,
                    programme: document.getElementById('programme').value,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                // Generate a unique 10‑digit ID with retries
                let studentId = null;
                let attempts = 0;
                const maxAttempts = 10;
                let success = false;

                while (!success && attempts < maxAttempts) {
                    const timestamp = Date.now().toString().slice(-5);
                    const random = Math.floor(Math.random() * 100000).toString().padStart(5, '0');
                    const candidateId = (timestamp + random).slice(0, 10);

                    try {
                        // Use a transaction that performs only writes.
                        // If either document already exists, the transaction will abort.
                        await db.runTransaction(async (transaction) => {
                            const emailRef = db.collection('emailLookup').doc(email);
                            const studentRef = db.collection('students').doc(candidateId);

                            // Write both documents – if either fails (already exists), transaction aborts.
                            transaction.set(emailRef, { studentId: candidateId });
                            transaction.set(studentRef, {
                                ...studentData,
                                studentId: candidateId
                            });
                        });

                        // If we reach here, transaction succeeded.
                        studentId = candidateId;
                        success = true;
                    } catch (error) {
                        // Check if the error is due to a duplicate (either email or ID)
                        // Firestore transaction errors don't have a specific code, so we check the message.
                        if (error.message.includes('already exists')) {
                            attempts++;
                            continue; // try again with a new ID
                        }
                        // For other errors (permissions, network), rethrow
                        throw error;
                    }
                }

                if (!success) {
                    throw new Error('Unable to generate a unique ID. Please try again later.');
                }

                // Show success
                studentIdSpan.textContent = studentId;
                resultDiv.style.display = 'block';
                registerForm.reset();

            } catch (error) {
                console.error('Registration error:', error);
                errorMessage.textContent = error.message;
                errorDiv.style.display = 'block';
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Register';
            }
        });
    </script>
</body>
</html>
