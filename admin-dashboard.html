<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - First Class SHS</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body {
            margin: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            color: #2e7d32;
        }
        h2 {
            color: #1b5e20;
            border-bottom: 2px solid #4caf50;
            padding-bottom: 10px;
        }
        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        #logout {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,100,0,0.2);
        }
        #logout:hover {
            background: #388e3c;
        }
        #controls {
            margin: 20px 0;
            padding: 20px;
            background: #e8f5e9;
            border-radius: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        #controls input, #controls select, #controls button {
            padding: 10px 15px;
            border: 1px solid #a5d6a7;
            border-radius: 30px;
            background: white;
            font-size: 0.95rem;
        }
        #controls button {
            background: #4caf50;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        #controls button:hover {
            background: #388e3c;
        }
        #searchInput {
            flex: 1;
            min-width: 250px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(0,50,0,0.1);
        }
        th, td {
            border: 1px solid #c8e6c9;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #4caf50;
            color: white;
            cursor: pointer;
        }
        tr:nth-child(even) {
            background-color: #f1f8e9;
        }
        .btn {
            padding: 5px 10px;
            margin: 2px;
            cursor: pointer;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            transition: 0.2s;
        }
        .edit {
            background: #66bb6a;
            color: white;
        }
        .edit:hover {
            background: #4caf50;
            transform: scale(1.02);
        }
        .delete {
            background: #2e7d32;
            color: white;
        }
        .delete:hover {
            background: #1b5e20;
            transform: scale(1.02);
        }
        #editModal {
            display: none;
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 30px;
            border: 2px solid #4caf50;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,50,0,0.3);
            z-index: 1000;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        #editModal h3 {
            margin-top: 0;
            color: #1b5e20;
            text-align: center;
        }
        #editForm label {
            display: block;
            margin: 12px 0 4px;
            color: #2e7d32;
            font-weight: 500;
        }
        #editForm input, #editForm select {
            width: 100%;
            padding: 10px;
            border: 1px solid #a5d6a7;
            border-radius: 12px;
            box-sizing: border-box;
        }
        .modal-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .modal-buttons button {
            padding: 12px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 48%;
        }
        .modal-buttons button[type="submit"] {
            background: #4caf50;
            color: white;
        }
        .modal-buttons button[type="button"] {
            background: #f44336;
            color: white;
        }
        .modal-buttons button[type="submit"]:hover {
            background: #388e3c;
        }
        .modal-buttons button[type="button"]:hover {
            background: #d32f2f;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <h2>Student Records</h2>
        <button id="logout">Logout</button>
    </div>

    <div id="controls">
        <input type="text" id="searchInput" placeholder="🔍 Search by name, ID, email, phone...">
        <select id="sortProgramme">
            <option value="">All Programmes</option>
            <option value="General Science">General Science</option>
            <option value="General Arts">General Arts</option>
            <option value="Agric Science">Agric Science</option>
            <option value="Business">Business</option>
            <option value="Home Economics">Home Economics</option>
            <option value="Visual Arts">Visual Arts</option>
            <option value="Technical">Technical</option>
        </select>
        <select id="sortBranch">
            <option value="">All Branches</option>
            <option value="Afranco (Kumasi)">Afranco (Kumasi)</option>
            <option value="Edwenase (Kumasi)">Edwenase (Kumasi)</option>
            <option value="Accra">Accra</option>
            <option value="Takoradi">Takoradi</option>
            <option value="Tamale">Tamale</option>
        </select>
        <input type="file" id="importFile" accept=".csv">
        <button id="importBtn">Import CSV</button>
        <button id="exportBtn">Export CSV</button>
    </div>

    <div id="studentTable">Loading...</div>

    <!-- Edit Modal -->
    <div id="editModal">
        <h3>Edit Student</h3>
        <form id="editForm">
            <input type="hidden" id="editDocId">

            <label for="editFullName">Full Name</label>
            <input type="text" id="editFullName" required>

            <label for="editDob">Date of Birth</label>
            <input type="date" id="editDob" required>

            <label for="editFatherName">Father's Name</label>
            <input type="text" id="editFatherName" required>

            <label for="editFatherPhone">Father's Phone</label>
            <input type="tel" id="editFatherPhone" required>

            <label for="editMotherName">Mother's Name</label>
            <input type="text" id="editMotherName" required>

            <label for="editMotherPhone">Mother's Phone</label>
            <input type="tel" id="editMotherPhone" required>

            <label for="editEmail">Email</label>
            <input type="email" id="editEmail" required>

            <label for="editBranch">Branch</label>
            <select id="editBranch" required>
                <option value="Afranco (Kumasi)">Afranco (Kumasi)</option>
                <option value="Edwenase (Kumasi)">Edwenase (Kumasi)</option>
                <option value="Accra">Accra</option>
                <option value="Takoradi">Takoradi</option>
                <option value="Tamale">Tamale</option>
            </select>

            <label for="editProgramme">Programme</label>
            <select id="editProgramme" required>
                <option value="General Science">General Science</option>
                <option value="General Arts">General Arts</option>
                <option value="Agric Science">Agric Science</option>
                <option value="Business">Business</option>
                <option value="Home Economics">Home Economics</option>
                <option value="Visual Arts">Visual Arts</option>
                <option value="Technical">Technical</option>
            </select>

            <div class="modal-buttons">
                <button type="submit">Update</button>
                <button type="button" onclick="closeModal()">Cancel</button>
            </div>
        </form>
    </div>

    <script>
        // 🔁 REPLACE WITH YOUR FIREBASE CONFIGURATION
        const firebaseConfig = {
    apiKey: "AIzaSyD2NcVIBagGd2X6iWPVc8jgsNziJ46qowA",
    authDomain: "student-id-77c22.firebaseapp.com",
    projectId: "student-id-77c22",
    storageBucket: "student-id-77c22.firebasestorage.app",
    messagingSenderId: "291646901870",
    appId: "1:291646901870:web:05a5fce5252ede9e5a207f"
  };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let allStudents = [];

        auth.onAuthStateChanged(user => {
            if (!user) window.location.href = 'admin-login.html';
            else loadStudents();
        });

        document.getElementById('logout').addEventListener('click', () => auth.signOut());

        async function loadStudents() {
            try {
                const snapshot = await db.collection('students').orderBy('createdAt', 'desc').get();
                allStudents = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                filterAndDisplay();
            } catch (error) {
                console.error('Error loading students:', error);
                document.getElementById('studentTable').innerHTML = '<p style="color:red;">Failed to load students.</p>';
            }
        }

        function filterAndDisplay() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const programmeFilter = document.getElementById('sortProgramme').value;
            const branchFilter = document.getElementById('sortBranch').value;

            let filtered = allStudents.filter(s => {
                const matchesSearch = searchTerm === '' || 
                    (s.studentId && s.studentId.toLowerCase().includes(searchTerm)) ||
                    (s.fullName && s.fullName.toLowerCase().includes(searchTerm)) ||
                    (s.email && s.email.toLowerCase().includes(searchTerm)) ||
                    (s.fatherName && s.fatherName.toLowerCase().includes(searchTerm)) ||
                    (s.motherName && s.motherName.toLowerCase().includes(searchTerm)) ||
                    (s.fatherPhone && s.fatherPhone.toLowerCase().includes(searchTerm)) ||
                    (s.motherPhone && s.motherPhone.toLowerCase().includes(searchTerm));

                const matchesProgramme = programmeFilter === '' || s.programme === programmeFilter;
                const matchesBranch = branchFilter === '' || s.branch === branchFilter;

                return matchesSearch && matchesProgramme && matchesBranch;
            });

            displayStudents(filtered);
        }

        function displayStudents(students) {
            if (students.length === 0) {
                document.getElementById('studentTable').innerHTML = '<p>No students found.</p>';
                return;
            }

            let html = '<table><tr><th>ID</th><th>Name</th><th>Programme</th><th>Branch</th><th>Father</th><th>Mother</th><th>Email</th><th>Actions</th></tr>';
            students.forEach(s => {
                html += `<tr>
                    <td>${s.studentId || s.id}</td>
                    <td>${s.fullName || ''}</td>
                    <td>${s.programme || ''}</td>
                    <td>${s.branch || ''}</td>
                    <td>${s.fatherName || ''} (${s.fatherPhone || ''})</td>
                    <td>${s.motherName || ''} (${s.motherPhone || ''})</td>
                    <td>${s.email || ''}</td>
                    <td>
                        <button class="btn edit" onclick="editStudent('${s.id}')">Edit</button>
                        <button class="btn delete" onclick="deleteStudent('${s.id}')">Delete</button>
                    </td>
                </tr>`;
            });
            html += '</table>';
            document.getElementById('studentTable').innerHTML = html;
        }

        document.getElementById('searchInput').addEventListener('input', filterAndDisplay);
        document.getElementById('sortProgramme').addEventListener('change', filterAndDisplay);
        document.getElementById('sortBranch').addEventListener('change', filterAndDisplay);

        window.editStudent = async (id) => {
            try {
                const doc = await db.collection('students').doc(id).get();
                if (!doc.exists) return alert('Student not found.');
                const data = doc.data();
                document.getElementById('editDocId').value = id;
                document.getElementById('editFullName').value = data.fullName || '';
                document.getElementById('editDob').value = data.dob || '';
                document.getElementById('editFatherName').value = data.fatherName || '';
                document.getElementById('editFatherPhone').value = data.fatherPhone || '';
                document.getElementById('editMotherName').value = data.motherName || '';
                document.getElementById('editMotherPhone').value = data.motherPhone || '';
                document.getElementById('editEmail').value = data.email || '';
                document.getElementById('editBranch').value = data.branch || 'Afranco (Kumasi)';
                document.getElementById('editProgramme').value = data.programme || 'General Science';
                document.getElementById('editModal').style.display = 'block';
            } catch (error) {
                alert('Error loading student: ' + error.message);
            }
        };

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editDocId').value;
            const updatedData = {
                fullName: document.getElementById('editFullName').value,
                dob: document.getElementById('editDob').value,
                fatherName: document.getElementById('editFatherName').value,
                fatherPhone: document.getElementById('editFatherPhone').value,
                motherName: document.getElementById('editMotherName').value,
                motherPhone: document.getElementById('editMotherPhone').value,
                email: document.getElementById('editEmail').value,
                branch: document.getElementById('editBranch').value,
                programme: document.getElementById('editProgramme').value
            };
            try {
                await db.collection('students').doc(id).update(updatedData);
                closeModal();
                loadStudents();
            } catch (error) {
                alert('Error updating: ' + error.message);
            }
        });

        window.deleteStudent = async (id) => {
            if (!confirm('Are you sure you want to delete this student?')) return;
            try {
                await db.collection('students').doc(id).delete();
                loadStudents();
            } catch (error) {
                alert('Error deleting: ' + error.message);
            }
        };

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }
        window.closeModal = closeModal;

        // Export CSV
        document.getElementById('exportBtn').addEventListener('click', () => {
            if (allStudents.length === 0) return alert('No data to export.');
            const headers = ['Student ID', 'Full Name', 'Date of Birth', "Father's Name", "Father's Phone", "Mother's Name", "Mother's Phone", 'Email', 'Branch', 'Programme'];
            const rows = allStudents.map(s => [
                s.studentId || s.id,
                s.fullName || '',
                s.dob || '',
                s.fatherName || '',
                s.fatherPhone || '',
                s.motherName || '',
                s.motherPhone || '',
                s.email || '',
                s.branch || '',
                s.programme || ''
            ]);
            let csv = headers.join(',') + '\n';
            rows.forEach(row => {
                const escapedRow = row.map(cell => {
                    if (typeof cell === 'string' && (cell.includes(',') || cell.includes('"'))) {
                        return `"${cell.replace(/"/g, '""')}"`;
                    }
                    return cell;
                }).join(',');
                csv += escapedRow + '\n';
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'students.csv';
            a.click();
            window.URL.revokeObjectURL(url);
        });

        // Import CSV
        document.getElementById('importBtn').addEventListener('click', () => {
            const file = document.getElementById('importFile').files[0];
            if (!file) return alert('Please select a CSV file.');
            const reader = new FileReader();
            reader.onload = async (e) => {
                const text = e.target.result;
                const lines = text.split('\n').map(line => line.trim()).filter(line => line);
                if (lines.length < 2) return alert('CSV must have header and data.');
                const dataRows = lines.slice(1);
                let success = 0, failed = 0;

                for (const row of dataRows) {
                    const fields = row.split(',').map(f => f.trim().replace(/^"(.*)"$/, '$1'));
                    if (fields.length < 10) { failed++; continue; }
                    const [studentId, fullName, dob, fatherName, fatherPhone, motherName, motherPhone, email, branch, programme] = fields;

                    if (!studentId) { failed++; continue; }

                    const studentData = {
                        studentId,
                        fullName,
                        dob,
                        fatherName,
                        fatherPhone,
                        motherName,
                        motherPhone,
                        email,
                        branch,
                        programme,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    try {
                        await db.collection('students').doc(studentId).set(studentData);
                        success++;
                    } catch (err) {
                        console.error(err);
                        failed++;
                    }
                }
                alert(`Import done. Success: ${success}, Failed: ${failed}`);
                loadStudents();
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
